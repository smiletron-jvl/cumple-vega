<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Invitación Cumpleaños VEGA</title>
<link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@400;700&family=Nunito:ital,wght@0,300;0,400;0,600;1,300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #0a1628;
    display: flex;
    justify-content: center;
    align-items: center;
    min-height: 100vh;
    font-family: 'Nunito', sans-serif;
  }

  .card {
    width: 420px;
    min-height: 680px;
    position: relative;
    background: linear-gradient(160deg, #0d2a4a 0%, #163d6e 30%, #0d2a4a 60%, #071525 100%);
    border-radius: 24px;
    overflow: hidden;
    box-shadow:
      0 0 0 1px rgba(160,220,255,0.2),
      0 0 40px rgba(80,180,255,0.15),
      0 30px 80px rgba(0,0,0,0.6);
    padding: 36px 32px 40px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* ICE BORDER */
  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    border-radius: 24px;
    border: 1.5px solid transparent;
    background: linear-gradient(135deg, rgba(180,240,255,0.6), rgba(80,160,255,0.2), rgba(180,240,255,0.6)) border-box;
    -webkit-mask: linear-gradient(#fff 0 0) padding-box, linear-gradient(#fff 0 0);
    -webkit-mask-composite: destination-out;
    mask-composite: exclude;
    pointer-events: none;
  }

  /* BACKGROUND SNOWFLAKES */
  .bg-flakes {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .bg-flake {
    position: absolute;
    color: rgba(180,230,255,0.08);
    font-size: 120px;
    animation: drift 12s ease-in-out infinite;
  }
  .bg-flake:nth-child(1) { top: -20px; left: -20px; animation-delay: 0s; }
  .bg-flake:nth-child(2) { top: 40%; right: -30px; font-size: 90px; animation-delay: 3s; }
  .bg-flake:nth-child(3) { bottom: 40px; left: 10px; font-size: 80px; animation-delay: 6s; }
  .bg-flake:nth-child(4) { bottom: -20px; right: -20px; font-size: 130px; animation-delay: 1.5s; }

  @keyframes drift {
    0%, 100% { transform: rotate(0deg) scale(1); }
    50% { transform: rotate(20deg) scale(1.05); }
  }

  /* SNOWFALL */
  #snowCanvas {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    pointer-events: none;
    z-index: 999;
  }

  /* CROWN / HEADER DECO */
  .header-deco {
    position: relative;
    width: 100%;
    display: flex;
    justify-content: center;
    margin-bottom: 6px;
    z-index: 2;
  }
  .crown {
    font-size: 32px;
    filter: drop-shadow(0 0 8px rgba(200,240,100,0.8));
    animation: glow 2.5s ease-in-out infinite;
  }
  @keyframes glow {
    0%, 100% { filter: drop-shadow(0 0 6px rgba(200,240,100,0.7)); }
    50% { filter: drop-shadow(0 0 18px rgba(200,240,100,1)); }
  }

  /* TITLE BLOCK */
  .title-block {
    z-index: 2;
    text-align: center;
    margin-bottom: 6px;
  }
  .title-top {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 13px;
    font-weight: 400;
    color: rgba(180,230,255,0.7);
    letter-spacing: 5px;
    text-transform: uppercase;
    margin-bottom: 6px;
  }
  .title-frozen {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 46px;
    font-weight: 700;
    background: linear-gradient(160deg, #e8f8ff 0%, #a8dcff 40%, #5ab8ff 70%, #c8f0ff 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    text-shadow: none;
    filter: drop-shadow(0 0 20px rgba(100,200,255,0.5));
    line-height: 1;
    letter-spacing: 2px;
  }

  /* ELSA ILLUSTRATION */
  .elsa-wrap {
    z-index: 2;
    position: relative;
    margin: 10px 0;
  }
  .elsa-svg {
    width: 180px;
    height: 200px;
    filter: drop-shadow(0 0 20px rgba(100,200,255,0.4));
    animation: float 4s ease-in-out infinite;
  }
  @keyframes float {
    0%, 100% { transform: translateY(0px); }
    50% { transform: translateY(-8px); }
  }

  /* ICE DIVIDER */
  .ice-divider {
    z-index: 2;
    width: 100%;
    display: flex;
    align-items: center;
    gap: 10px;
    margin: 8px 0;
  }
  .ice-line {
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(140,210,255,0.6), transparent);
  }
  .ice-crystal { font-size: 18px; color: rgba(160,230,255,0.9); }

  /* BIRTHDAY SECTION */
  .birthday-section {
    z-index: 2;
    text-align: center;
    margin-bottom: 6px;
  }
  .birthday-label {
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 300;
    color: rgba(160,210,255,0.7);
    letter-spacing: 4px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }
  .name-placeholder {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 28px;
    font-weight: 700;
    background: linear-gradient(135deg, #fff9c4, #ffe082, #fff9c4);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    filter: drop-shadow(0 0 12px rgba(255,220,80,0.5));
    letter-spacing: 1px;
  }
  .age-badge {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    margin-top: 8px;
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, rgba(80,160,255,0.3), rgba(30,100,200,0.5));
    border: 1.5px solid rgba(140,210,255,0.5);
    box-shadow: 0 0 20px rgba(100,180,255,0.3);
  }
  .age-num {
    font-family: 'Cinzel Decorative', cursive;
    font-size: 22px;
    font-weight: 700;
    background: linear-gradient(160deg, #e0f4ff, #a0d4ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
    line-height: 1;
  }
  .age-years {
    font-size: 10px;
    color: rgba(180,220,255,0.8);
    letter-spacing: 1px;
    text-transform: uppercase;
    display: block;
    font-style: italic;
  }

  /* INFO CARD */
  .info-card {
    z-index: 2;
    width: 100%;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(140,210,255,0.2);
    border-radius: 16px;
    padding: 20px 24px;
    display: flex;
    flex-direction: column;
    gap: 14px;
    margin-top: 10px;
    backdrop-filter: blur(4px);
    box-shadow: inset 0 1px 0 rgba(200,240,255,0.1);
  }
  .info-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }
  .info-icon {
    font-size: 22px;
    flex-shrink: 0;
    filter: drop-shadow(0 0 6px rgba(100,200,255,0.5));
  }
  .info-content {}
  .info-label {
    font-size: 9px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: rgba(140,200,255,0.6);
    margin-bottom: 2px;
  }
  .info-value {
    font-size: 15px;
    font-weight: 600;
    color: rgba(220,245,255,0.95);
    letter-spacing: 0.3px;
  }

  /* RSVP */
  .rsvp-section {
    z-index: 2;
    text-align: center;
    margin-top: 18px;
  }
  .rsvp-text {
    font-size: 11px;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: rgba(160,210,255,0.6);
    margin-bottom: 6px;
  }
  .rsvp-contact {
    font-size: 14px;
    font-weight: 600;
    color: rgba(200,240,255,0.9);
  }

  /* BOTTOM SNOWFLAKES DECO */
  .bottom-deco {
    z-index: 2;
    margin-top: 16px;
    display: flex;
    gap: 10px;
    align-items: center;
  }
  .mini-flake {

    font-size: 14px;

  }

  .mini-flake:nth-child(3) { animation-duration: 7s; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

  /* ICE BOTTOM BORDER */
  .ice-bottom {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 60px;
    pointer-events: none;
    z-index: 1;
  }
</style>

<script>
  window.addEventListener('load', function() {
    const canvas = document.getElementById('snowCanvas');
    const ctx = canvas.getContext('2d');

    function resize() {
      canvas.width  = window.innerWidth;
      canvas.height = window.innerHeight;
    }
    resize();
    window.addEventListener('resize', resize);

    const FLAKE_COUNT = 60;
    const flakes = [];

    function newFlake(randomY) {
      return {
        x:       Math.random() * canvas.width,
        y:       randomY ? Math.random() * canvas.height : -10,
        r:       Math.random() * 3 + 1.5,
        speed:   Math.random() * 0.9 + 0.4,
        drift:   (Math.random() - 0.5) * 0.5,
        alpha:   Math.random() * 0.5 + 0.3,
        angle:   Math.random() * Math.PI * 2,
        spin:    (Math.random() - 0.5) * 0.03,
      };
    }

    for (let i = 0; i < FLAKE_COUNT; i++) flakes.push(newFlake(true));

    function drawFlake(f) {
      ctx.save();
      ctx.globalAlpha = f.alpha;
      ctx.strokeStyle = '#c8eeff';
      ctx.lineWidth   = f.r * 0.5;
      ctx.lineCap     = 'round';
      ctx.translate(f.x, f.y);
      ctx.rotate(f.angle);
      for (let i = 0; i < 6; i++) {
        const len = f.r * 2.5;
        ctx.beginPath();
        ctx.moveTo(0, 0);
        ctx.lineTo(0, len);
        ctx.moveTo(0, len * 0.5);
        ctx.lineTo(f.r * 0.7, len * 0.75);
        ctx.moveTo(0, len * 0.5);
        ctx.lineTo(-f.r * 0.7, len * 0.75);
        ctx.stroke();
        ctx.rotate(Math.PI / 3);
      }
      ctx.restore();
    }

    function loop() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      for (const f of flakes) {
        drawFlake(f);
        f.y     += f.speed;
        f.x     += f.drift;
        f.angle += f.spin;
        if (f.y > canvas.height + 10) {
          Object.assign(f, newFlake(false));
        }
      }
      requestAnimationFrame(loop);
    }
    loop();
  });
</script>
</body>
</html>
